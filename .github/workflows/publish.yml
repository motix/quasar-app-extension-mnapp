name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack & Setup Yarn
        run: corepack enable

      - name: Remove unnecessary files and folders
        run: rm -rf .github .vscode .yarn dev doc scripts src templates editorsconfig .pnp* .prettier* .yarnrc.yml eslint.config.js init.js

      - name: Remove postinstall script
        run: npm pkg delete scripts.postinstall

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Publish to npm
        run: NODE_AUTH_TOKEN="" npm publish --access public --provenance
