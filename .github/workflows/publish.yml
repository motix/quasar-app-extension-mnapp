name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack & Setup Yarn
        run: corepack enable

      - name: Remove `dev` folder
        run: rm -rf ./dev

      - name: Remove `.yarnrc.yml`
        run: rm -f ./.yarnrc.yml

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Publish to npm
        run: NODE_AUTH_TOKEN="" npm publish --access public --provenance
