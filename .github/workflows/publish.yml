name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: write # Required for OIDC trusted publishing
  id-token: write # Required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack & Setup Yarn
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install templates dependencies
        run: cd templates && yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Publish to npm
        run: NODE_AUTH_TOKEN="" npm publish --access public --provenance
